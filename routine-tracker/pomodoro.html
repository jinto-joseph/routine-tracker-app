<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer - Focus & Productivity</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/wellness-tracker.js"></script>
  <script>
    // Apply saved theme immediately in HEAD to prevent flash
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>
<body>
<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h5 class="mb-0"><i class="bi bi-calendar-check"></i> Routine Tracker</h5>
    <button class="btn-close-sidebar d-lg-none" id="closeSidebar">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>
  
  <nav class="sidebar-nav">
    <a href="index.html" class="sidebar-link">
      <i class="bi bi-house-door"></i>
      <span>Home</span>
    </a>
    <a href="analytics.html" class="sidebar-link">
      <i class="bi bi-graph-up"></i>
      <span>Analytics</span>
    </a>
    <a href="pomodoro.html" class="sidebar-link active">
      <i class="bi bi-clock-history"></i>
      <span>Pomodoro</span>
    </a>
    <button class="sidebar-link" id="reminderBtnSidebar">
      <i class="bi bi-bell"></i>
      <span>Reminders</span>
    </button>
    <button class="sidebar-link" id="editRoutinesSidebar">
      <i class="bi bi-pencil-square"></i>
      <span>Edit Routines</span>
    </button>
    <button class="sidebar-link" id="addRoutinesSidebar">
      <i class="bi bi-plus-circle"></i>
      <span>Add Routines</span>
    </button>
    <button class="sidebar-link" id="exportBtnSidebar">
      <i class="bi bi-download"></i>
      <span>Export Data</span>
    </button>
  </nav>
  
  <!-- Mini Calendar -->
  <div class="sidebar-calendar">
    <div class="sidebar-calendar-header">
      <button class="btn-calendar-nav" id="prevMonth">
        <i class="bi bi-chevron-left"></i>
      </button>
      <span class="calendar-title" id="calendarTitle">January 2026</span>
      <button class="btn-calendar-nav" id="nextMonth">
        <i class="bi bi-chevron-right"></i>
      </button>
    </div>
    <div class="calendar-grid" id="miniCalendar">
      <!-- Calendar will be generated here -->
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="main-content">
  <!-- Top Navbar -->
  <nav class="navbar border-bottom px-3 py-2">
    <button class="btn btn-link d-lg-none" id="toggleSidebar">
      <i class="bi bi-list fs-4"></i>
    </button>
    <a class="navbar-brand fw-bold" href="index.html">
      <i class="bi bi-clock-history"></i> Pomodoro Timer
    </a>
    <div class="ms-auto">
      <button id="themeToggle" class="btn btn-light">🌙</button>
    </div>
  </nav>

<div class="container">
  <div class="pomodoro-container">
    <h1 class="text-center my-4">
      <i class="bi bi-clock-history"></i> Pomodoro Timer
    </h1>
    
    <!-- Category Selector -->
    <div class="card mb-4">
      <div class="card-body">
        <label for="sessionCategory" class="form-label fw-bold">Category</label>
        <select class="form-select" id="sessionCategory">
          <option value="Career">Career</option>
          <option value="Improvement">Improvement</option>
          <option value="Personal">Personal</option>
          <option value="Study">Study</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    
    <!-- Session Type Selector -->
    <div class="card mb-4">
      <div class="card-body">
        <label class="form-label fw-bold">Session Type</label>
        <div class="btn-group w-100" role="group">
          <input type="radio" class="btn-check" name="sessionType" id="pomodoro" value="pomodoro" checked>
          <label class="btn btn-outline-primary" for="pomodoro">Pomodoro (25min)</label>
          
          <input type="radio" class="btn-check" name="sessionType" id="shortBreak" value="shortBreak">
          <label class="btn btn-outline-success" for="shortBreak">Short Break (5min)</label>
          
          <input type="radio" class="btn-check" name="sessionType" id="longBreak" value="longBreak">
          <label class="btn btn-outline-info" for="longBreak">Long Break (15min)</label>
        </div>
      </div>
    </div>
    
    <!-- Timer Display -->
    <div class="card mb-4">
      <div class="card-body text-center">
        <div class="pomodoro-circle-container">
          <svg class="pomodoro-progress-ring" width="300" height="300">
            <circle
              class="pomodoro-progress-ring__circle"
              stroke="var(--border)"
              stroke-width="8"
              fill="transparent"
              r="140"
              cx="150"
              cy="150"
            />
            <circle
              id="progressCircle"
              class="pomodoro-progress-ring__progress"
              stroke="var(--primary)"
              stroke-width="8"
              fill="transparent"
              r="140"
              cx="150"
              cy="150"
              style="stroke-dasharray: 879.646; stroke-dashoffset: 879.646;"
            />
          </svg>
          <div class="pomodoro-timer-overlay">
            <div class="pomodoro-timer" id="timer">25:00</div>
            <div class="mt-2">
              <span class="badge bg-secondary" id="sessionCount">Session: 0</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Controls -->
    <div class="pomodoro-controls mb-4">
      <button id="startBtn" class="btn btn-success btn-lg" onclick="startPomodoro()">
        <i class="bi bi-play-fill"></i> Start
      </button>
      <button id="pauseBtn" class="btn btn-warning btn-lg" onclick="pausePomodoro()" style="display: none;">
        <i class="bi bi-pause-fill"></i> Pause
      </button>
      <button id="resetBtn" class="btn btn-danger btn-lg" onclick="resetPomodoro()">
        <i class="bi bi-arrow-clockwise"></i> Reset
      </button>
    </div>
    
    <!-- Session History -->
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-list-check"></i> Today's Sessions</span>
        <button class="btn btn-sm btn-outline-danger" onclick="clearTodaySessions()" title="Clear today's sessions">
          <i class="bi bi-trash"></i> Clear All
        </button>
      </div>
      <div class="card-body" id="sessionHistory">
        <p class="text-muted text-center">No sessions completed today</p>
      </div>
    </div>
    
    <!-- Custom Timer -->
    <div class="card mt-4">
      <div class="card-header">
        <i class="bi bi-gear"></i> Custom Timer
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Minutes</label>
            <input type="number" id="customMinutes" class="form-control" value="25" min="1" max="120">
          </div>
          <div class="col-md-6">
            <label class="form-label">Seconds</label>
            <input type="number" id="customSeconds" class="form-control" value="0" min="0" max="59">
          </div>
          <div class="col-12">
            <button class="btn btn-primary w-100" onclick="setCustomTimer()">
              Set Custom Timer
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/pomodoro.js"></script>
<script>
  // Theme toggle with sync across windows
  const themeToggle = document.getElementById("themeToggle");
  const currentTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', currentTheme);
  themeToggle.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
  
  themeToggle.onclick = () => {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
    // Trigger storage event for other windows
    window.dispatchEvent(new Event('storage'));
  };
  
  // Listen for theme changes from other windows
  window.addEventListener('storage', (e) => {
    if (e.key === 'theme' || e.key === null) {
      const newTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
    }
  });
  
  // Session type change
  document.querySelectorAll('input[name="sessionType"]').forEach(radio => {
    radio.addEventListener('change', (e) => {
      resetPomodoro();
    });
  });
  
  // Sidebar toggle functionality
  const sidebar = document.getElementById('sidebar');
  const toggleSidebarBtn = document.getElementById('toggleSidebar');
  const closeSidebarBtn = document.getElementById('closeSidebar');
  
  if (toggleSidebarBtn) {
    toggleSidebarBtn.addEventListener('click', () => {
      sidebar.classList.add('show');
    });
  }
  
  if (closeSidebarBtn) {
    closeSidebarBtn.addEventListener('click', () => {
      sidebar.classList.remove('show');
    });
  }
  
  // Close sidebar when clicking outside on mobile
  document.addEventListener('click', (e) => {
    if (window.innerWidth <= 992 && 
        sidebar.classList.contains('show') && 
        !sidebar.contains(e.target) && 
        !toggleSidebarBtn.contains(e.target)) {
      sidebar.classList.remove('show');
    }
  });
</script>

<!-- Event Modal -->
<div class="modal fade" id="eventModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content modal-slide-down">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-calendar-event"></i> Add Event
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label for="eventDate" class="form-label">Date</label>
          <input type="text" class="form-control" id="eventDate" readonly>
        </div>
        <div class="mb-3">
          <label for="eventTitle" class="form-label">Event Title</label>
          <input type="text" class="form-control" id="eventTitle" placeholder="Enter event name">
        </div>
        <div class="mb-3">
          <label for="eventTime" class="form-label">Time (Optional)</label>
          <input type="time" class="form-control" id="eventTime">
        </div>
        <div class="mb-3">
          <label for="eventDescription" class="form-label">Description (Optional)</label>
          <textarea class="form-control" id="eventDescription" rows="3" placeholder="Add details..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="saveEventBtn">Save Event</button>
      </div>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  // Make showEventModal accessible globally
  window.showEventModal = function(dateStr) {
    const modal = new bootstrap.Modal(document.getElementById('eventModal'));
    document.getElementById('eventDate').value = dateStr;
    document.getElementById('eventTitle').value = '';
    document.getElementById('eventTime').value = '';
    document.getElementById('eventDescription').value = '';
    modal.show();
  };
  
  // Calendar generation
  function generateCalendar() {
    const calendar = document.getElementById('miniCalendar');
    const titleElement = document.getElementById('calendarTitle');
    if (!calendar || !titleElement) return;
    
    const now = new Date();
    const year = window.currentCalendarYear || now.getFullYear();
    const month = window.currentCalendarMonth !== undefined ? window.currentCalendarMonth : now.getMonth();
    
    window.currentCalendarYear = year;
    window.currentCalendarMonth = month;
    
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    const startingDayOfWeek = firstDay.getDay();
    
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];
    titleElement.textContent = `${monthNames[month]} ${year}`;
    
    let html = '<div class="calendar-weekdays">';
    ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(day => {
      html += `<div class="calendar-weekday">${day}</div>`;
    });
    html += '</div><div class="calendar-days">';
    
    for (let i = 0; i < startingDayOfWeek; i++) {
      html += '<div class="calendar-day"></div>';
    }
    
    const today = new Date();
    const isCurrentMonth = year === today.getFullYear() && month === today.getMonth();
    
    const events = JSON.parse(localStorage.getItem('calendarEvents') || '{}');
    
    for (let day = 1; day <= daysInMonth; day++) {
      const isToday = isCurrentMonth && day === today.getDate();
      const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const hasEvent = events[dateKey] && events[dateKey].length > 0;
      
      html += `<div class="calendar-day ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}" 
                    onclick="showEventModal('${dateKey}')">${day}</div>`;
    }
    
    html += '</div>';
    calendar.innerHTML = html;
  }
  
  document.getElementById('prevMonth')?.addEventListener('click', () => {
    window.currentCalendarMonth--;
    if (window.currentCalendarMonth < 0) {
      window.currentCalendarMonth = 11;
      window.currentCalendarYear--;
    }
    generateCalendar();
  });
  
  document.getElementById('nextMonth')?.addEventListener('click', () => {
    window.currentCalendarMonth++;
    if (window.currentCalendarMonth > 11) {
      window.currentCalendarMonth = 0;
      window.currentCalendarYear++;
    }
    generateCalendar();
  });
  
  document.getElementById('saveEventBtn')?.addEventListener('click', function() {
    const dateStr = document.getElementById('eventDate').value;
    const title = document.getElementById('eventTitle').value.trim();
    const time = document.getElementById('eventTime').value;
    const description = document.getElementById('eventDescription').value.trim();
    
    if (!title) {
      alert('Please enter an event title');
      return;
    }
    
    const events = JSON.parse(localStorage.getItem('calendarEvents') || '{}');
    if (!events[dateStr]) events[dateStr] = [];
    
    events[dateStr].push({
      title: title,
      time: time,
      description: description,
      id: Date.now()
    });
    
    localStorage.setItem('calendarEvents', JSON.stringify(events));
    
    const modal = bootstrap.Modal.getInstance(document.getElementById('eventModal'));
    modal.hide();
    
    generateCalendar();
    
    if (time) {
      scheduleEventNotification(dateStr, time, title);
    }
  });
  
  function scheduleEventNotification(dateStr, timeStr, title) {
    const [hours, minutes] = timeStr.split(':');
    const eventDate = new Date(dateStr);
    eventDate.setHours(parseInt(hours), parseInt(minutes), 0, 0);
    
    const now = new Date();
    const timeDiff = eventDate - now;
    
    if (timeDiff > 0 && timeDiff < 24 * 60 * 60 * 1000) {
      setTimeout(() => {
        if (Notification.permission === 'granted') {
          new Notification('Event Reminder', {
            body: title,
            icon: '/icon-192.png'
          });
        }
        
        if (typeof playReminderSound === 'function') {
          playReminderSound();
        }
      }, timeDiff);
    }
  }
  
  generateCalendar();
  
  // Request notification permission
  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }
